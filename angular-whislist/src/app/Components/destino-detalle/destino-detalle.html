<div class="container my-4">
  <div *ngIf="destino; else noEncontrado">
    <div class="card shadow-sm">
      <img [src]="destino.imagenUrl" class="card-img-top" alt="{{ destino.nombre }}" style="max-height:350px;object-fit:cover;">
      <div class="card-body">
        <h2 class="card-title">{{ destino.nombre }}</h2>
        <h6 class="text-muted mb-3">Servicios incluidos</h6>
        <ul class="list-group list-group-flush">
          <li *ngFor="let s of destino.servicios" class="list-group-item">{{ s }}</li>
        </ul>
      </div>
    </div>

    <div class="mt-4">
      <h5 class="mb-2">Mapa del destino</h5>
      <mgl-map
        [style]="mapStyle"
        [zoom]="[1]"
        accessToken=""
        style="width: 100%; height: 400px; border-radius: 8px;">
        <!-- Marker con popup: al hacer click se muestra un mensaje -->
        <mgl-marker [lngLat]="[-58.38, -34.60]">
          <div style="cursor:pointer; font-size:28px;" title="Click para más info">📍</div>
          <mgl-popup>
            <div style="padding: 8px; font-weight: bold;">
              🌍 {{ destino?.nombre || 'Destino turístico' }}
              <br><small>¡Haz click para explorar!</small>
            </div>
          </mgl-popup>
        </mgl-marker>
      </mgl-map>
    </div>
  </div>

  <ng-template #noEncontrado>
    <div class="text-center my-5 text-muted">
      <p>El destino no fue encontrado.</p>
      <a routerLink="/" class="btn btn-outline-primary" appTrackingClick data-tracking-tag="volver-inicio">Volver al inicio</a>
    </div>
  </ng-template>
</div>
