<div class="container content">
	<div class="row">
		<div class="col-md-6 offset-md-3">
			<span class="anchor" id="formLogin"></span>
			<div class="card card-outline-secondary">
				<div class="card-header">
					<h3 class="mb-0">{{ 'LISTA.TITULO' | translate }}</h3>
				</div>
				<div class="card-body">
					<app-form-destino-viaje (onItemAdded)="agregado($event)"></app-form-destino-viaje>
				</div>
			</div>
		</div>
	</div>

	<hr class="mb-5">

	<div *ngIf="loading" class="text-center my-5">
		<div class="spinner-border text-primary" role="status">
			<span class="visually-hidden">{{ 'LISTA.LOADING' | translate }}</span>
		</div>
		<p class="mt-2 text-muted">{{ 'LISTA.LOADING' | translate }}</p>
	</div>

	<div class="row row-flex">
		<app-destino-viaje
			*ngFor="let d of all; let i = index"
			[destino]="d"
			[idx]="i + 1"
			(clicked)="elegido($event)">
		</app-destino-viaje>
	</div>

	<div *ngIf="!loading && all.length === 0" class="text-center my-5 text-muted">
		<p>{{ 'LISTA.EMPTY' | translate }}</p>
	</div>

	<hr class="mb-3">

	<div *ngIf="updates.length > 0" class="row">
		<div class="col-12">
			<h5>{{ 'LISTA.ACTIVIDAD' | translate }}</h5>
			<ul class="list-unstyled">
				<li *ngFor="let u of updates" class="text-muted small">• {{ u }}</li>
			</ul>
		</div>
	</div>
</div>
