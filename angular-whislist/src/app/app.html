<div class="container content">

  <div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h1>{{ 'APP.TITLE' | translate }}</h1>
        <div class="navLinks">
          <a routerLink="/home" routerLinkActive="active" appTrackingClick data-tracking-tag="nav-home">{{ 'NAV.HOME' | translate }}</a>
          <a routerLink="/destino" routerLinkActive="active" appTrackingClick data-tracking-tag="nav-destino">{{ 'NAV.DESTINO' | translate }}</a>
        </div>
      </div>

      <!-- Selector de idioma -->
      <div class="language-selector d-flex align-items-center gap-2">
        <label for="langSelect" class="mb-0 fw-semibold">{{ 'LISTA.LANG_SELECTOR' | translate }}:</label>
        <select
          id="langSelect"
          class="form-select form-select-sm"
          style="width: auto"
          [value]="selectedLang"
          (change)="changeLanguage($any($event.target).value)">
          <option value="es">🇦🇷 Español</option>
          <option value="en">🇺🇸 English</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row">
    <router-outlet></router-outlet>
  </div>

  <hr class="mb-5">

  <p class="text-muted small">{{ 'APP.DATE_LABEL' | translate }}: {{ time | async }}</p>

</div>
